name: Update Match Results

on:
  schedule:
    # Runs at 8 AM, 2 PM, 6 PM, and 10 PM EDT (UTC-4 for summer)
    - cron: '0 2,12,18,22 * * *' 
  workflow_dispatch: # Allows you to trigger it manually from GitHub

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install supabase requests
      - name: Run Updater Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
        run: python updater.py